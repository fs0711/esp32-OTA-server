# Mosquitto ACL Configuration
# Access Control List for MQTT Topics
# Place this file at: /etc/mosquitto/auth/acl

# =============================================================================
# SUPERUSER ACCESS
# =============================================================================
# Users listed here have full access to all topics (read/write/subscribe)

# Local admin user - full access to everything
user admin
topic readwrite #

# Local server monitoring user - full access
user server
topic readwrite #

# Additional admin users can be added here
# user your_admin_username
# topic readwrite #

# =============================================================================
# DEVICE ACCESS PATTERNS
# =============================================================================
# Devices authenticated via HTTP backend have ACL checked by the backend API
# The HTTP backend ACL endpoint (/api/mqtt/acl) handles device-specific permissions
# Devices can only access topics containing their device_id

# Example device pattern (handled by HTTP backend, not this file):
# Device "DV-001" can access:
#   - devices/DV-001/telemetry
#   - devices/DV-001/commands
#   - devices/DV-001/status

# =============================================================================
# TOPIC PATTERNS FOR REFERENCE
# =============================================================================

# Pattern syntax:
# topic [read|write|readwrite] <topic>
#   read      - Can subscribe and receive
#   write     - Can publish
#   readwrite - Can both subscribe and publish

# Wildcards:
#   +  - Single level wildcard (e.g., devices/+/status)
#   #  - Multi level wildcard (e.g., devices/#)

# Examples:
# user monitoring
# topic read devices/#
# topic read system/#
#
# user controller
# topic write devices/+/commands
# topic read devices/+/status
#
# user logger
# topic read #

# =============================================================================
# COMMON TOPIC STRUCTURE
# =============================================================================

# Recommended topic hierarchy:
#   devices/<device_id>/telemetry     - Device sensor data
#   devices/<device_id>/commands      - Commands to device
#   devices/<device_id>/status        - Device status updates
#   devices/<device_id>/config        - Device configuration
#   devices/<device_id>/logs          - Device logs
#   system/alerts                     - System-wide alerts
#   system/status                     - System status
#   admin/commands                    - Administrative commands

# =============================================================================
# SECURITY NOTES
# =============================================================================

# 1. Always use principle of least privilege
# 2. Grant only necessary permissions to each user
# 3. Avoid using '#' wildcard unless truly needed
# 4. Review and audit ACL rules regularly
# 5. Use specific topic patterns when possible
# 6. Consider separate users for different functions
# 7. Monitor access logs for unauthorized attempts
