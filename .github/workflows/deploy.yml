name: Flask CI/CD

on:
  push:
    branches:
      - master   # deploy on push to master

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # - name: Set up Python
    #   uses: actions/setup-python@v5
    #   with:
    #     python-version: '3.10'

    # - name: Install dependencies
    #   run: |
    #     python -m pip install --upgrade pip
    #     pip install -r requirements.txt

    # - name: Run tests
    #   run: pytest

    - name: Deploy to Ubuntu Server
      env:
        HOST: ${{ secrets.SSH_HOST }}
        USER: ${{ secrets.SSH_USER }}
        PRIVATE_KEY: ${{ secrets.SSH_KEY }}
        PASSWORD: ${{ secrets.SSH_PASSWORD }}
      run: |
        echo "USER is set: $(if [ -n "$USER" ]; then echo "YES"; else echo "NO"; fi)"
        echo "PASSWORD is set: $(if [ -n "$PASSWORD" ]; then echo "YES"; else echo "NO"; fi)"
        echo "PRIVATE_KEY is set: $(if [ -n "$PRIVATE_KEY" ]; then echo "YES"; else echo "NO"; fi)"
        echo "HOST is set: $(if [ -n "$HOST" ]; then echo "YES"; else echo "NO"; fi)"
        mkdir -p ~/.ssh
        echo "$PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $USER@$HOST "
          cd /home/esp32ota-backend &&
          git pull origin master &&
          source env/bin/activate &&
          pip install -r requirements.txt &&  vbxxn 
          sudo systemctl restart esp32-ota.service
        "