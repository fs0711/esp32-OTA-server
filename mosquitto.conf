# Mosquitto MQTT Broker Configuration
# ESP32 OTA Backend Authentication

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

# Listener configuration
listener 1883
protocol mqtt

# Allow connections from any interface
bind_address 0.0.0.0

# Maximum number of client connections
max_connections -1

# =============================================================================
# AUTHENTICATION SETTINGS
# =============================================================================

# TESTING MODE: Allow anonymous connections (DISABLE IN PRODUCTION)
# Set to false to require authentication for all clients
# TODO: Change to 'false' when testing is complete
allow_anonymous true

# When allow_anonymous is true, authenticated users still work alongside anonymous ones
# When set to false, only authenticated clients can connect

# =============================================================================
# MOSQUITTO-GO-AUTH PLUGIN CONFIGURATION
# =============================================================================

# Path to the mosquitto-go-auth plugin
# Update this path based on your system
# Linux: /usr/lib/mosquitto-go-auth.so
# Windows: C:/Program Files/mosquitto/mosquitto-go-auth.dll
auth_plugin /usr/lib/mosquitto-go-auth.so

# Enable debug logging for auth plugin (set to false in production)
auth_opt_log_level debug

# =============================================================================
# HTTP BACKEND CONFIGURATION
# =============================================================================

# Use HTTP backend for authentication
auth_opt_backends http

# Backend server configuration
# Connects to gunicorn via localhost HTTP binding (127.0.0.1:5000)
# This is separate from the nginx reverse proxy which uses Unix socket
auth_opt_http_host http://127.0.0.1
auth_opt_http_port 5000

# Authentication endpoints
auth_opt_http_getuser_uri /api/mqtt/auth
auth_opt_http_superuser_uri /api/mqtt/superuser
auth_opt_http_aclcheck_uri /api/mqtt/acl

# HTTP request configuration
auth_opt_http_method POST
auth_opt_http_with_tls false
auth_opt_http_params_mode form

# Response mode (expects json response from backend)
auth_opt_http_response_mode json

# Status codes that indicate success
auth_opt_http_ok_status_codes 200

# Timeout settings (in seconds)
auth_opt_http_timeout 5

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================

# Log types: error, warning, notice, information, subscribe, unsubscribe, websockets, none, all
log_type error
log_type warning
log_type notice
log_type information

# Log destination
# Options: stdout, stderr, syslog, topic, file, dlt
log_dest stdout

# Uncomment to log to file instead
# log_dest file /var/log/mosquitto/mosquitto.log

# Log timestamp format
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# =============================================================================
# PERSISTENCE SETTINGS
# =============================================================================

# Enable message persistence
persistence true
persistence_location /var/lib/mosquitto/

# Autosave interval (in seconds)
autosave_interval 1800

# =============================================================================
# SECURITY SETTINGS (Optional - Uncomment for TLS/SSL)
# =============================================================================

# Uncomment these lines to enable TLS/SSL encryption
# listener 8883
# protocol mqtt
# cafile /etc/mosquitto/certs/ca.crt
# certfile /etc/mosquitto/certs/server.crt
# keyfile /etc/mosquitto/certs/server.key
# require_certificate false
# use_identity_as_username false
# tls_version tlsv1.2

# =============================================================================
# WEBSOCKETS LISTENER (Optional)
# =============================================================================

# Uncomment to enable WebSocket support
# listener 9001
# protocol websockets

# =============================================================================
# PERFORMANCE TUNING
# =============================================================================

# Maximum queued messages per client
max_queued_messages 1000

# Maximum QoS (0, 1, or 2)
max_qos 2

# Connection messages - set to false to reduce overhead
connection_messages true

# =============================================================================
# CLIENT SESSION SETTINGS
# =============================================================================

# Persistent client expiration (in seconds)
# Clients with clean_session=false will expire after this time
persistent_client_expiration 1h

# =============================================================================
# NOTES FOR PRODUCTION DEPLOYMENT
# =============================================================================

# Before deploying to production:
# 1. Set allow_anonymous to false
# 2. Set auth_opt_log_level to error or warning
# 3. Enable TLS/SSL encryption
# 4. Update auth_opt_http_host to your production backend URL
# 5. Consider using HTTPS for the backend (auth_opt_http_with_tls true)
# 6. Review and adjust log settings
# 7. Configure proper file permissions for certificates and keys
# 8. Set up log rotation for log files
# 9. Review and adjust max_connections based on expected load
# 10. Test ACL rules thoroughly

# =============================================================================
# TESTING INSTRUCTIONS
# =============================================================================

# To test authentication while allow_anonymous is true:
# 
# 1. Test anonymous connection:
#    mosquitto_pub -h localhost -t "test/anonymous" -m "Hello Anonymous"
#
# 2. Test authenticated connection:
#    First, generate HMAC password using Python:
#      import hmac, hashlib
#      device_id = "DV-001"
#      access_token = "your-device-access-token"
#      password = hmac.new(access_token.encode(), device_id.encode(), hashlib.sha256).hexdigest()
#      print(password)
#
#    Then connect with credentials:
#      mosquitto_pub -h localhost -u "DV-001" -P "<hmac_password>" -t "devices/DV-001/test" -m "Hello Authenticated"
#
# 3. Monitor logs to see authentication attempts:
#    tail -f /var/log/mosquitto/mosquitto.log
#
# 4. When ready for production, change allow_anonymous to false and restart:
#    sudo systemctl restart mosquitto
