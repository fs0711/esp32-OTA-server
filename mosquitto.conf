# Mosquitto MQTT Broker Configuration
# ESP32 OTA Backend Authentication

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

# Apply auth settings (allow_anonymous, plugin, etc.) per listener.
per_listener_settings true

# =============================================================================
# LISTENER 1: External/Device Connections (Authenticated ONLY)
# =============================================================================
# This listener handles connections from ESP32 devices and external clients
# Requires HMAC-based authentication via HTTP backend or file-based credentials
# NO anonymous connections allowed on this port

listener 1883 0.0.0.0
protocol mqtt
allow_anonymous false

# =============================================================================
# MOSQUITTO-GO-AUTH PLUGIN CONFIGURATION (LISTENER 1883 ONLY)
# =============================================================================

# Path to the mosquitto-go-auth plugin
# Update this path based on your system
# Linux: /usr/lib/mosquitto-go-auth.so
# Windows: C:/Program Files/mosquitto/mosquitto-go-auth.dll
auth_plugin /usr/lib/mosquitto-go-auth/go-auth.so

# Enable debug logging for auth plugin (set to false in production)
auth_opt_log_level debug
auth_opt_log_dest file
auth_opt_log_file /home/shaheer/mosquitto-auth.log

# Check prefix - allows anonymous access on listeners with allow_anonymous true
auth_opt_check_prefix false

# Cache settings (optional - improves performance)
auth_opt_cache false
auth_opt_cache_type go-cache
auth_opt_cache_reset true

auth_opt_auth_cache_seconds 60
auth_opt_acl_cache_seconds 60
auth_opt_auth_jitter_seconds 5
auth_opt_acl_jitter_seconds 5

# Use HTTP backend for ESP32/device authentication.
# Add `files` only when /etc/mosquitto/auth/passwords exists.
auth_opt_backends http

# Password file for local admin users (created with mosquitto_passwd)
auth_opt_files_password_path /etc/mosquitto/auth/passwords

# ACL file for topic access control
auth_opt_files_acl_path /etc/mosquitto/auth/acl

# Hasher for password file (pw = mosquitto password file format)
# Options: pw, pbkdf2, bcrypt, argon2id
auth_opt_files_hasher pw

# Allow superusers defined in password file
auth_opt_files_register superuser

# Backend server configuration
auth_opt_http_host 127.0.0.1
auth_opt_http_port 5000

# Authentication endpoints
auth_opt_http_getuser_uri /api/mqtt/auth
auth_opt_http_superuser_uri /api/mqtt/superuser
auth_opt_http_aclcheck_uri /api/mqtt/acl

# HTTP request configuration
auth_opt_http_method POST
auth_opt_http_with_tls false
auth_opt_http_params_mode json
auth_opt_http_response_mode json

# Response mode (expects json response from backend)
auth_opt_http_response_mode json

# Status codes that indicate success
auth_opt_http_ok_status_codes 200

# Timeout settings (in seconds)
auth_opt_http_timeout 5

# Maximum number of client connections
max_connections -1

# =============================================================================
# LISTENER 2: Local Server Connections (Localhost Only - No Auth)
# =============================================================================
# This listener is for local server applications (backend, monitoring, etc.)
# Only accessible from localhost - full access to all topics
# No authentication required for localhost connections

listener 1884 127.0.0.1
protocol mqtt
allow_anonymous true

# Mount point for local connections (optional - uncomment to isolate topics)
# mount_point local/

# =============================================================================
# LISTENER 3: Unauthenticated Connections (Testing/Development)
# =============================================================================
# DISABLED: Anonymous testing port removed for production security.
# Re-enable below only in development environments.

listener 1885 0.0.0.0
protocol mqtt
allow_anonymous true

# =============================================================================
# AUTHENTICATION SETTINGS
# =============================================================================

# Port 1883: Authenticated clients only (files backend + HTTP backend)
# Port 1884: Localhost only, no authentication (for local server tools)
# Port 1885: Anonymous allowed (for testing - DISABLE IN PRODUCTION)

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================

# Log types: error, warning, notice, information, subscribe, unsubscribe, websockets, none, all
log_type all
# log_type warning
# log_type notice
# log_type information

# Log destination
# Options: stdout, stderr, syslog, topic, file, dlt
# log_dest stdout

# Uncomment to log to file instead
log_dest file /home/shaheer/mosquitto-auth.log

# Log timestamp format
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# =============================================================================
# PERSISTENCE SETTINGS
# =============================================================================

# Enable message persistence
persistence true
persistence_location /var/lib/mosquitto/

# Autosave interval (in seconds)
autosave_interval 1800

# =============================================================================
# SECURITY SETTINGS (Optional - Uncomment for TLS/SSL)
# =============================================================================

# Uncomment these lines to enable TLS/SSL encryption
# listener 8883
# protocol mqtt
# cafile /etc/mosquitto/certs/ca.crt
# certfile /etc/mosquitto/certs/server.crt
# keyfile /etc/mosquitto/certs/server.key
# require_certificate false
# use_identity_as_username false
# tls_version tlsv1.2

# =============================================================================
# WEBSOCKETS LISTENER (Optional)
# =============================================================================

# Uncomment to enable WebSocket support
# listener 9001
# protocol websockets

# =============================================================================
# PERFORMANCE TUNING
# =============================================================================

# Maximum queued messages per client (0 = unlimited)
# Set to reasonable value to prevent memory issues
max_queued_messages 1000

# Maximum QoS is determined by client, not a broker config option
# QoS levels: 0 (at most once), 1 (at least once), 2 (exactly once)

# Connection messages - set to false to reduce overhead
connection_messages false

# =============================================================================
# CLIENT SESSION SETTINGS
# =============================================================================

# Persistent client expiration
# Clients with clean_session=false will expire after this time
# Mosquitto 2.x requires time suffix: s (seconds), m (minutes), h (hours), d (days)
# Examples: 3600s, 60m, 1h, 7d
persistent_client_expiration 1h

# =============================================================================
# NOTES FOR PRODUCTION DEPLOYMENT
# =============================================================================

# Before deploying to production:
# 1. allow_anonymous is now false on port 1883 (authenticated only)
# 2. DISABLE or FIREWALL port 1885 (anonymous testing port)
# 3. Set auth_opt_log_level to error or warning
# 4. Enable TLS/SSL encryption on port 8883
# 5. Update auth_opt_http_host to your production backend URL
# 6. Consider using HTTPS for the backend (auth_opt_http_with_tls true)
# 7. Review and adjust log settings
# 8. Configure proper file permissions for certificates and keys
# 9. Set up log rotation for log files
# 10. Review and adjust max_connections based on expected load
# 11. Test ACL rules thoroughly
# 12. Remove or comment out listener 1885 entirely in production

# =============================================================================
# TESTING INSTRUCTIONS
# =============================================================================

# OPTION 1: Authenticated Connection (Port 1883 - Production Ready)
# ================================================================
# Setup local admin user:
#   sudo bash setup_local_mqtt_users.sh
#
# Then connect with full access to all topics:
#   mosquitto_pub -h localhost -u "admin" -P "yourpassword" -t "system/test" -m "Hello Server"
#   mosquitto_sub -h localhost -u "admin" -P "yourpassword" -t "#" -v

# OPTION 2: Localhost Only (Port 1884 - No Auth Required)
# =======================================================
# For local server tools and monitoring:
#   mosquitto_pub -h localhost -p 1884 -t "system/test" -m "Hello Localhost"
#   mosquitto_sub -h localhost -p 1884 -t "#" -v

# OPTION 3: Anonymous Connection (Port 1885 - Testing Only)
# =========================================================
# For quick testing without authentication (DISABLE IN PRODUCTION):
#   mosquitto_pub -h localhost -p 1885 -t "test/anonymous" -m "Hello Anonymous"
#   mosquitto_sub -h localhost -p 1885 -t "#" -v
#   mosquitto_pub -h localhost -p 1884 -t "system/test" -m "Hello Localhost"
#   mosquitto_sub -h localhost -p 1884 -t "#" -v

# OPTION 4: ESP32 Device Client (HMAC Authentication - Port 1883)
# ===============================================================
# Generate HMAC password using Python:
#   import hmac, hashlib
#   device_id = "DV-001"
#   access_token = "your-device-access-token"
#   password = hmac.new(access_token.encode(), device_id.encode(), hashlib.sha256).hexdigest()
#   print(password)
#
# Then connect with device credentials to port 1883:
#   mosquitto_pub -h localhost -u "DV-001" -P "<hmac_password>" \
#     -t "devices/DV-001/test" -m "Hello Device"

# MONITORING & DEBUGGING
# =======================
# Monitor authentication attempts:
#   journalctl -u mosquitto -f
#
# Test authentication endpoint directly:
#   curl -X POST http://127.0.0.1:5000/api/mqtt/auth -d "username=test&password=test"

# PRODUCTION DEPLOYMENT
# ======================
# When ready for production:
# 1. Port 1883: Already requires authentication ✓
# 2. Port 1884: Keep for localhost-only access (optional)
# 3. Port 1885: DISABLE or block with firewall (anonymous access)
# 4. Set auth_opt_log_level to error or warning
# 5. Enable TLS/SSL on port 8883
# 6. Configure firewall:
#    - Allow: 1883 (authenticated MQTT)
#    - Allow: 8883 (MQTT over TLS) - optional
#    - Block: 1885 (anonymous testing port)
#    - Block: 1884 from external (localhost only)
# 7. Restart: sudo systemctl restart mosquitto